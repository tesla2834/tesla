<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050006">
  <title>DatingOS v2.0 - Chapter 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" class="game-shell" aria-live="polite">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <canvas id="fxCanvas" class="fx-canvas" aria-hidden="true"></canvas>
    <section id="screen" class="screen boot-screen"></section>
    <nav class="hud" aria-label="DatingOS durumu">
      <span class="hud-dot"></span>
      <span id="hudLabel">DatingOS v2.0</span>
      <span id="chapterLabel">Chapter 2</span>
    </nav>
  </main>

  <template id="princessTemplate">
    <div class="character princess" aria-hidden="true">
      <div class="hair back"></div>
      <div class="head">
        <div class="hair fringe"></div>
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>
        <div class="brow brow-left"></div>
        <div class="brow brow-right"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
      </div>
      <div class="neck"></div>
      <div class="body"><div class="scrub-v"></div><div class="badge"></div></div>
      <div class="arm arm-left"></div>
      <div class="arm arm-right"></div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
